{% extends 'base.html' %}

{% block conteudo %}

<div class="animais bg-black bg-gradient w-100 pt-3">
    <div class="text-center mb-5">
        <h1 class="text-white fs-2 mt-0 mb-1">Gerador de Animais</h1>
        <p class="text-secondary small">Clique nos botões para gerar imagens aleatórias</p>
    </div>

    <div class="d-flex flex-column flex-md-row gap-3 gap-md-0 align-items-center w-100">

        <!-- Gato -->
        <div class="col-12 col-md-4 px-md-3">
            <div class="card rounded-4 p-3 p-lg-4 d-flex flex-column gap-3 bg-dark overflow-hidden">
                <div class="img-wrapper">
                    <img id="img-gato" alt="" src="" style="display:none;">
                    <span class="img-placeholder" id="icon-gato">🐱</span>
                </div>
                <a class="btn btn-warning w-100" onclick="getGato()">
                    Gerar gato
                </a>
            </div>
        </div>

        <!-- Cachorro -->
        <div class="col-12 col-md-4 px-md-3">
            <div class="card rounded-4 p-3 p-lg-4 d-flex flex-column gap-3 bg-dark overflow-hidden">
                <div class="img-wrapper">
                    <img id="img-dog" src="" alt="Cachorro" style="display:none;">
                    <span class="img-placeholder" id="icon-dog">🐶</span>
                </div>
                <a class="btn btn-info w-100 text-dark" onclick="getDog()">
                    Gerar cachorro
                </a>
            </div>
        </div>

        <!-- Raposa -->
        <div class="col-12 col-md-4 px-md-3">
            <div class="card rounded-4 p-3 p-lg-4 d-flex flex-column gap-3 bg-dark overflow-hidden">
                <div class="img-wrapper">
                    <img id="img-fox" src="" alt="Raposa" style="display:none;">
                    <span class="img-placeholder" id="icon-fox">🦊</span>
                </div>
                <a class="btn btn-danger w-100" onclick="getFox()">
                    Gerar raposa
                </a>
            </div>
        </div>

    </div>
</div>

{% endblock %}
